version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: oj_postgres
    environment:
      POSTGRES_USER: oj_user
      POSTGRES_PASSWORD: oj_password
      POSTGRES_DB: oj_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oj_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oj_app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=oj_user
      - DB_PASSWORD=oj_password
      - DB_NAME=oj_platform
    volumes:
      - ./config.yaml:/app/config.yaml
    networks:
      - oj_network

volumes:
  postgres_data:

networks:
  oj_network:
    driver: bridge
