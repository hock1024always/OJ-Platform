apiVersion: v1
kind: Namespace
metadata:
  name: multi-agent-system
  labels:
    name: multi-agent-system
    app: multi-agent
---
# 为不同类型的 Agent 创建独立的 Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: agent-developer
  labels:
    name: agent-developer
    agent-type: developer
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-tester
  labels:
    name: agent-tester
    agent-type: tester
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-architect
  labels:
    name: agent-architect
    agent-type: architect
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-devops
  labels:
    name: agent-devops
    agent-type: devops
---
# ResourceQuota 限制每个 Namespace 的资源
apiVersion: v1
kind: ResourceQuota
metadata:
  name: agent-quota
  namespace: agent-developer
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: agent-quota
  namespace: agent-tester
spec:
  hard:
    requests.cpu: "5"
    requests.memory: 10Gi
    limits.cpu: "10"
    limits.memory: 20Gi
    pods: "5"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: agent-quota
  namespace: agent-architect
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "2"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: agent-quota
  namespace: agent-devops
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 6Gi
    limits.cpu: "6"
    limits.memory: 12Gi
    pods: "3"
---
# NetworkPolicy 限制 Agent 间的网络访问
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-network-policy
  namespace: agent-developer
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: multi-agent-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: multi-agent-system
    - to: []  # 允许访问外部网络 (如下载依赖)
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
