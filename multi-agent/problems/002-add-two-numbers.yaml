id: "002"
title: "两数相加"
difficulty: medium
tags: [linked-list, math, recursion]

description: |
  给你两个非空的链表，表示两个非负的整数。它们每位数字都是按照逆序的方式存储的，并且每个节点只能存储一位数字。
  请你将两个数相加，并以相同形式返回一个表示和的链表。
  你可以假设除了数字 0 之外，这两个数都不会以 0 开头。

examples:
  - input: "l1 = [2,4,3], l2 = [5,6,4]"
    output: "[7,0,8]"
    explanation: "342 + 465 = 807"

  - input: "l1 = [0], l2 = [0]"
    output: "[0]"
    explanation: "0 + 0 = 0"

  - input: "l1 = [9,9,9,9,9,9,9], l2 = [9,9,9,9]"
    output: "[8,9,9,9,0,0,0,1]"
    explanation: "9999999 + 9999 = 10009998"

constraints:
  - "每个链表中的节点数在范围 [1, 100] 内"
  - "0 <= Node.val <= 9"
  - "题目数据保证列表表示的数字不含前导零"

keywords: [链表, 数学, 进位, 相加, 逆序]
related_problems: ["043", "067", "445"]
solution_patterns:
  - pattern: "模拟加法"
    hint: "同时遍历两个链表，逐位相加并处理进位"
    complexity: "O(max(m,n)) 时间, O(max(m,n)) 空间"

mcp_tools:
  - name: "get_hint"
    args: ["level"]
  - name: "check_solution"
    args: ["code", "language"]
