id: "001"
title: "两数之和"
difficulty: easy
tags: [array, hash-table, two-pointers]

description: |
  给定一个整数数组 nums 和一个整数目标值 target，请你在该数组中找出和为目标值 target 的那两个整数，并返回它们的数组下标。
  你可以假设每种输入只会对应一个答案，并且你不能使用两次相同的元素。
  你可以按任意顺序返回答案。

examples:
  - input: "nums = [2,7,11,15], target = 9"
    output: "[0,1]"
    explanation: "因为 nums[0] + nums[1] == 9，返回 [0, 1]"

  - input: "nums = [3,2,4], target = 6"
    output: "[1,2]"
    explanation: "因为 nums[1] + nums[2] == 6，返回 [1, 2]"

  - input: "nums = [3,3], target = 6"
    output: "[0,1]"
    explanation: "因为 nums[0] + nums[1] == 6，返回 [0, 1]"

constraints:
  - "2 <= nums.length <= 10^4"
  - "-10^9 <= nums[i] <= 10^9"
  - "-10^9 <= target <= 10^9"
  - "只会存在一个有效答案"

# RAG 向量化字段
keywords: [数组, 哈希表, 双指针, 查找, 两数之和, 索引]
related_problems: ["015", "167", "170"]
solution_patterns:
  - pattern: "哈希表一次遍历"
    hint: "使用哈希表存储已遍历元素及其索引，对于每个元素 nums[i]，查找 target - nums[i] 是否在哈希表中"
    complexity: "O(n) 时间, O(n) 空间"
    code_example: |
      def twoSum(nums, target):
          seen = {}
          for i, num in enumerate(nums):
              if target - num in seen:
                  return [seen[target - num], i]
              seen[num] = i
          return []

  - pattern: "暴力枚举"
    hint: "两层循环枚举所有可能的数对，检查是否等于 target"
    complexity: "O(n²) 时间, O(1) 空间"
    code_example: |
      def twoSum(nums, target):
          for i in range(len(nums)):
              for j in range(i + 1, len(nums)):
                  if nums[i] + nums[j] == target:
                      return [i, j]
          return []

